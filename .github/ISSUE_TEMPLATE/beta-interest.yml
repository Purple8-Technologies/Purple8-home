name: Beta application
description: Apply for Purple8 beta access
labels:
  - beta-intake
  - pending-review
title: "[Beta Application] <company-or-name>"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in Purple8 Beta.

        This form is used for:
        - capturing beta demand
        - internal review and approval
        - issuing a time-bound beta license (30 days full access)
  - type: input
    id: full_name
    attributes:
      label: Full name
      placeholder: Jane Smith
    validations:
      required: true
  - type: input
    id: work_email
    attributes:
      label: Work email
      placeholder: jane@company.com
    validations:
      required: true
  - type: input
    id: company
    attributes:
      label: Company
      placeholder: Acme Corp
    validations:
      required: false
  - type: dropdown
    id: use_type
    attributes:
      label: Usage type
      options:
        - Personal / side project
        - Professional / company
        - Enterprise evaluation
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Primary use case
      description: What are you trying to build with Purple8?
      placeholder: RAG backend for internal policy assistant...
    validations:
      required: true
  - type: textarea
    id: timeline
    attributes:
      label: Timeline and urgency
      placeholder: Need to evaluate in next 2 weeks...
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand beta licenses are full-access but time-bound to 30 days by default.
          required: true
        - label: I agree that this beta is for evaluation and feedback.
          required: true
        - label: >
            I have read and agree to the
            [Purple8 Beta Software Agreement](https://github.com/Purple8-Technologies/Purple8-home/blob/main/BETA_AGREEMENT.md),
            including the confidentiality and feedback licence terms.
          required: true
