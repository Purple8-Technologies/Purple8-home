name: General waitlist
description: Join the Purple8 general waitlist for launch updates
labels:
  - waitlist-intake
title: "[Waitlist] <company-or-name>"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for joining the Purple8 waitlist.

        Use this form when you want launch updates but are not applying for the reviewed beta program.
  - type: input
    id: full_name
    attributes:
      label: Full name
      placeholder: Jane Smith
    validations:
      required: true
  - type: input
    id: work_email
    attributes:
      label: Email
      placeholder: jane@company.com
    validations:
      required: true
  - type: input
    id: company
    attributes:
      label: Company
      placeholder: Acme Corp
    validations:
      required: false
  - type: dropdown
    id: use_type
    attributes:
      label: Usage type
      options:
        - Personal / side project
        - Professional / company
        - Enterprise evaluation
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Primary use case
      description: What are you planning to build with Purple8?
      placeholder: Knowledge graph + RAG backend for...
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand this is the general waitlist, not the reviewed beta application flow.
          required: true
