name: Beta Approval

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  approve:
    if: github.event.label.name == 'beta-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Extract applicant metadata
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const getField = (label) => {
              const re = new RegExp(`### ${label}\\n([\\s\\S]*?)(?:\\n### |$)`, "m");
              const match = body.match(re);
              return match ? match[1].trim() : "";
            };

            const data = {
              issue_number: context.payload.issue.number,
              issue_title: context.payload.issue.title,
              issue_url: context.payload.issue.html_url || "",
              full_name: getField("Full name"),
              work_email: getField("Work email"),
              company: getField("Company"),
              use_type: getField("Usage type"),
              use_case: getField("Primary use case"),
              timeline: getField("Timeline and urgency"),
              approved_at: new Date().toISOString(),
              beta_duration_days: 30,
              target_entitlement: "enterprise-equivalent-beta",
              stage: "approved",
              actor: context.actor || "",
              source_repo: `${context.repo.owner}/${context.repo.repo}`,
            };

            core.setOutput("json", JSON.stringify(data, null, 2));

      - name: Create approval artifact payload
        run: |
          mkdir -p out
          cat > out/beta-approval-${{ github.event.issue.number }}.json << 'JSON'
          ${{ steps.extract.outputs.json }}
          JSON

      - name: Upload approval artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-approval-${{ github.event.issue.number }}
          path: out/beta-approval-${{ github.event.issue.number }}.json
          retention-days: 14

      - name: Post approval checklist
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ["beta-license-pending"]
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                "✅ Beta application approved.",
                "",
                "An approval artifact was generated in Actions artifacts for this run.",
                "",
                "License issuance checklist (30-day full access):",
                "1. Issue beta license with 30-day expiry",
                "2. Use full-access entitlement for beta",
                "3. Send license + download quickstart to applicant",
                "4. Mark this issue with `beta-license-issued` once sent"
              ].join("\\n")
            });

      - name: Send approval event to Command Center
        env:
          CC_BASE_URL: ${{ vars.CC_BASE_URL }}
          CC_BETA_MONITOR_TOKEN: ${{ secrets.CC_BETA_MONITOR_TOKEN }}
          EVENT_JSON: ${{ steps.extract.outputs.json }}
        run: |
          if [ -z "${CC_BASE_URL:-}" ] || [ -z "${CC_BETA_MONITOR_TOKEN:-}" ]; then
            echo "Command Center monitor is not configured; skipping beta event forward."
            exit 0
          fi
          python - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["EVENT_JSON"])
          event = {
              "source_repo": payload.get("source_repo", "Purple8-Technologies/Purple8-home"),
              "issue_number": payload["issue_number"],
              "issue_title": payload.get("issue_title", ""),
              "issue_url": payload.get("issue_url", ""),
              "applicant_email": payload.get("work_email", ""),
              "applicant_name": payload.get("full_name", ""),
              "company": payload.get("company", ""),
              "intent": "beta",
              "stage": payload.get("stage", "approved"),
              "actor": payload.get("actor", ""),
              "metadata": {
                  "workflow": "beta-approval",
                  "intent": "beta",
                  "target_entitlement": payload.get("target_entitlement", "enterprise-equivalent-beta"),
                  "beta_duration_days": payload.get("beta_duration_days", 30),
              },
          }
          with open("/tmp/beta-event.json", "w", encoding="utf-8") as f:
              json.dump(event, f)
          PY
          success=0
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error --max-time 10 \
              -X POST "${CC_BASE_URL}/public/beta-event" \
              -H "Content-Type: application/json" \
              -H "X-Beta-Monitor-Token: ${CC_BETA_MONITOR_TOKEN}" \
              --data @/tmp/beta-event.json; then
              success=1
              break
            fi
            sleep $((attempt * 2))
          done

          if [ "$success" -ne 1 ]; then
            echo "::warning::Command Center event forwarding failed after retries (non-blocking)."
          fi
