<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="25%"  stop-color="#c084fc"/>
      <stop offset="50%"  stop-color="#a855f7"/>
      <stop offset="75%"  stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Dark background for social media use -->
  <rect width="120" height="120" rx="24" fill="#0a0a0f"/>
  <!-- Infinity mark centred in square -->
  <g transform="translate(0,30)" filter="url(#glow)">
    <path
      d="M60 30
         C60 12 45 5 30 15
         C15 25 15 35 30 45
         C45 55 60 48 60 30
         C60 12 75 5 90 15
         C105 25 105 35 90 45
         C75 55 60 48 60 30"
      fill="none"
      stroke="url(#g)"
      stroke-width="7"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
