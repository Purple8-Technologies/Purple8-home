<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07070a"/>
      <stop offset="50%" stop-color="#09090e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- left cluster: logo and particle/graph motif -->
  <g transform="translate(80,60)">
    <!-- square background for logo -->
    <rect x="0" y="0" width="156" height="156" rx="20" fill="#0a0a0f"/>
    <!-- infinity mark (stroke) -->
    <g transform="translate(8,8) scale(1.1)" filter="url(#glow)">
      <path d="M60 30 C60 12 45 5 30 15 C15 25 15 35 30 45 C45 55 60 48 60 30 C60 12 75 5 90 15 C105 25 105 35 90 45 C75 55 60 48 60 30"
            fill="none" stroke="url(#stroke)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- particle nodes -->
    <g opacity="0.95">
      <circle cx="110" cy="24" r="2.8" fill="#8b5cf6" opacity="0.9"/>
      <circle cx="132" cy="56" r="2.2" fill="#c084fc" opacity="0.8"/>
      <circle cx="40" cy="120" r="2.6" fill="#e879f9" opacity="0.85"/>
      <circle cx="78" cy="88" r="2" fill="#a855f7" opacity="0.75"/>
      <line x1="110" y1="24" x2="132" y2="56" stroke="#7c3aed" stroke-width="0.9" opacity="0.45"/>
      <line x1="78" y1="88" x2="40" y2="120" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
    </g>
  </g>

  <!-- right area: headline and subcopy -->
  <g transform="translate(300,120)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Purple8</text>
    <text x="0" y="56" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#cbd5e1">AI-native infrastructure for knowledge-intensive systems</text>

    <text x="0" y="110" font-family="Inter, sans-serif" font-size="18" fill="#94a3b8">Hyper Graph • DocIntel • MCP-native agents • Self-hosted</text>

    <!-- CTA pill -->
    <g transform="translate(0,150)">
      <rect x="0" y="0" width="260" height="44" rx="22" fill="#7c3aed" opacity="0.95"/>
      <text x="34" y="30" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#fff">Request early access →</text>
    </g>
  </g>

  <!-- subtle right-side particle field -->
  <g transform="translate(1120,40)" opacity="0.18">
    <circle cx="20" cy="18" r="2.6" fill="#a855f7" />
    <circle cx="54" cy="40" r="1.8" fill="#c084fc" />
    <circle cx="100" cy="28" r="3.2" fill="#e879f9" />
    <line x1="20" y1="18" x2="54" y2="40" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="54" y1="40" x2="100" y2="28" stroke="#7c3aed" stroke-width="0.6"/>
  </g>

  <!-- footer small tagline -->
  <text x="80" y="360" font-family="Inter, sans-serif" font-size="12" fill="#6b7280">purple8.ai • www.purple8.ai</text>
</svg>